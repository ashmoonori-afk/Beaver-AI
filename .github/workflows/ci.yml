name: ci

on:
  push:
    branches: [main, 'dev/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm -r exec tsc --noEmit

      # review-pass v0.1: dependency CVE scan. `--audit-level=high`
      # only fails the build for HIGH/CRITICAL advisories so MEDIUM
      # noise doesn't block a release tag. v0.1.x will add cargo audit
      # for the Rust crate side once cargo-audit is on the runner.
      - name: pnpm audit (HIGH+)
        run: pnpm audit --audit-level=high --prod
        continue-on-error: false
