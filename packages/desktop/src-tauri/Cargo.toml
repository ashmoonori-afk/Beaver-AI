[package]
name = "beaver-desktop"
version = "0.1.0"
description = "Beaver AI desktop shell — Tauri v2 wrapping the React UI from Phase 4U"
authors = ["Beaver AI contributors"]
license = "MIT"
repository = "https://github.com/ashmoonori-afk/Beaver-AI-Dev"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "beaver_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.10.3", features = [] }
tauri-plugin-log = "2"
